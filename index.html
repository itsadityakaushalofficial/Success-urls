<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Confirmed — The Biryani House Bali</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Georgia', serif;
    background: #1a0a00;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .container {
    text-align: center;
    max-width: 420px;
    width: 100%;
  }

  .icon {
    font-size: 52px;
    margin-bottom: 24px;
    display: block;
  }

  .check {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 2px solid #c8860a;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 32px;
    color: #c8860a;
    font-size: 28px;
  }

  .tagline {
    font-size: 12px;
    letter-spacing: 4px;
    color: #c8860a;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  h1 {
    font-size: 32px;
    font-weight: 400;
    color: #fff8f0;
    line-height: 1.3;
    margin-bottom: 12px;
    letter-spacing: 0.5px;
  }

  .sub {
    font-size: 15px;
    color: #a07850;
    margin-bottom: 40px;
    line-height: 1.7;
    font-family: Arial, sans-serif;
  }

  .divider {
    width: 48px;
    height: 1px;
    background: #c8860a;
    margin: 0 auto 32px;
    opacity: 0.5;
  }

  .restaurant {
    font-size: 18px;
    color: #fff8f0;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .location {
    font-size: 12px;
    letter-spacing: 3px;
    color: #c8860a;
    text-transform: uppercase;
    font-family: Arial, sans-serif;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="check">✓</div>
    <p class="tagline">Payment Confirmed</p>
    <h1>Thank You</h1>
    <p class="sub">
      Your order has been received.<br>
      We're preparing it fresh just for you.
    </p>
    <div class="divider"></div>
    <p class="restaurant">🍛 The Biryani House Bali</p>
    <p class="location">Authentic Homemade Indian Cuisine</p>
  </div>
</body>
</html>
