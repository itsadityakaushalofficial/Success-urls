<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: Arial, sans-serif;
  background: #fff8f0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.card {
  background: white;
  border-radius: 16px;
  padding: 32px 24px;
  max-width: 420px;
  width: 100%;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}
.check-circle {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: #EAF3DE;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 16px;
  font-size: 32px;
}
.headline {
  text-align: center;
  margin-bottom: 24px;
}
.headline h1 {
  font-size: 22px;
  font-weight: 600;
  color: #1a1a1a;
  margin-bottom: 4px;
}
.headline p {
  font-size: 14px;
  color: #777;
}
.restaurant {
  font-size: 13px;
  font-weight: 600;
  color: #D85A30;
  margin-top: 4px;
}
.divider {
  border: none;
  border-top: 1px solid #f0f0f0;
  margin: 16px 0;
}
.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  font-size: 14px;
}
.label { color: #888; }
.value { color: #1a1a1a; font-weight: 500; }
.badge {
  background: #EAF3DE;
  color: #27500A;
  padding: 3px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
}
.total-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0 0;
}
.total-label {
  font-size: 15px;
  font-weight: 600;
  color: #1a1a1a;
}
.total-value {
  font-size: 18px;
  font-weight: 700;
  color: #3B6D11;
}
.eta-box {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #f9f9f9;
  border-radius: 10px;
  padding: 12px 16px;
  margin-top: 16px;
}
.eta-icon { font-size: 22px; }
.eta-label { font-size: 12px; color: #888; }
.eta-time { font-size: 14px; font-weight: 600; color: #1a1a1a; }
.footer {
  background: #FAECE7;
  border-radius: 10px;
  padding: 14px 16px;
  text-align: center;
  margin-top: 16px;
}
.footer p {
  font-size: 13px;
  color: #993C1D;
  line-height: 1.7;
}
</style>
</head>
<body>
<div class="card">
  <div class="check-circle">✅</div>

  <div class="headline">
    <h1>Payment Confirmed!</h1>
    <p>Thank you for your order</p>
    <p class="restaurant">🍛 The Biryani House Bali</p>
  </div>

  <div class="divider"></div>

  <div class="row">
    <span class="label">🧾 Order ID</span>
    <span class="value" id="orderId">—</span>
  </div>
  <div class="row">
    <span class="label">👤 Name</span>
    <span class="value" id="customerName">—</span>
  </div>
  <div class="row">
    <span class="label">📦 Order type</span>
    <span class="badge" id="orderType">—</span>
  </div>

  <div class="divider"></div>

  <div class="row">
    <span class="label">🍽️ Items</span>
    <span class="value" id="orderItems">—</span>
  </div>

  <div class="total-row">
    <span class="total-label">Total paid</span>
    <span class="total-value" id="totalAmount">—</span>
  </div>

  <div class="eta-box">
    <span class="eta-icon">⏱️</span>
    <div>
      <p class="eta-label">Estimated ready time</p>
      <p class="eta-time" id="etaTime">20 – 30 minutes</p>
    </div>
  </div>

  <div class="footer">
    <p>
      Your food is being freshly prepared 🍳<br>
      <strong>+62 813 591 0423</strong><br>
      biryanihousebali.com
    </p>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);

const orderId = params.get('order_id');
const name = params.get('customer_name');
const type = params.get('order_type');
const items = params.get('order_details');
const amount = params.get('amount');

if (orderId) document.getElementById('orderId').textContent = orderId;
if (name) document.getElementById('customerName').textContent = name;
if (type) {
  document.getElementById('orderType').textContent = 
    type.charAt(0).toUpperCase() + type.slice(1);
}
if (items) document.getElementById('orderItems').textContent = items;
if (amount) {
  const rp = parseInt(amount) / 100;
  document.getElementById('totalAmount').textContent = 
    'Rp ' + rp.toLocaleString('id-ID');
}
if (type === 'delivery') {
  document.getElementById('etaTime').textContent = '40 – 60 minutes';
}
</script>
</body>
</html>
